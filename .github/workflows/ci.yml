name: jobs output
on:
  push:
    branches:
      [ main , keyur ]

jobs:
  generator:
    name: generate output
    runs-on: ubuntu-latest
    outputs:
      output_key: ${{ steps.generate_output.outputs.NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate output
        id: generate_output
        run: |
          echo "NAME=keyur" >> $GITHUB_OUTPUT
  printer:
    name: print output
    runs-on: ubuntu-latest
    needs: generator
    steps:
      - name: Print output
        run: echo "Welcome  ${{ needs.generator.outputs.output_key }}"