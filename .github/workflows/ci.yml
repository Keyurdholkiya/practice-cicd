name: automatic rollback new version without remove and delay old version
on:
  push: 
    tags: 
      - "v*"

jobs:
  test-app:
    uses: Keyurdholkiya/reusable-workflow/.github/workflows/ci.yml@main
    with:
      node-version: "22"

  docker-login:
    needs: test-app
    uses: Keyurdholkiya/reusable-workflow/.github/workflows/docker.yml@main
    with:
     image-tag: ${{ github.ref_name }}
     file-docker: "./Dockerfile"
     push-image: true
     docker-hub-repo: "production"
    secrets: 
     DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
     DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
 
  deploy-job:
    needs: docker-login
    uses: Keyurdholkiya/reusable-workflow/.github/workflows/ec2-login.yml@main
    with:
      envs: ${{ github.ref_name }}
      script: |
            NGINX_CONF="/etc/nginx/sites-available/default"

            if sudo grep -q "127.0.0.1:3000 down" "$NGINX_CONF"; then
              CURRENT_PORT="3001"
              NEXT_PORT="3000"
              NEXT_NAME="orignal"
              OLD_NAME="carry"
            else
              CURRENT_PORT="3000"
              NEXT_PORT="3001"
              NEXT_NAME="carry"
              OLD_NAME="orignal"
            fi

            echo "📢 Next: $NEXT_NAME on Port $NEXT_PORT"

            sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
            sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true

            # 👈 FIX 3b: Swapped $DOCKER_USERNAME to the local env var $DOCKER_USERNAME
             
            sudo docker pull $DOCKER_USERNAME/production:$COMMIT_VERSION

            sudo docker run -d --name "$NEXT_NAME" -p $NEXT_PORT:3000 $DOCKER_USERNAME/production:$COMMIT_VERSION

            sleep 8

            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$NEXT_PORT/health)
            if [ "$STATUS_CODE" -ne 200 ]; then 
              sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
              sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true
              exit 1
            fi

            if [ "$NEXT_NAME" = "orignal" ]; then
              sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
              sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=9 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
            else
              sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=9 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
              sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
            fi
            sudo systemctl reload nginx
            sleep 7

            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$NEXT_PORT/health)
            if [ "$STATUS_CODE" -ne 200 ]; then 
              if [ "$NEXT_NAME" = "orignal" ]; then
                sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 down;/g' "$NGINX_CONF"
                sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
              else
                sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
                sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 down;/g' "$NGINX_CONF"
              fi
              sudo systemctl reload nginx
              sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
              sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true
              exit 1
            fi

            sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=5 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
            sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=5 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
            sudo systemctl reload nginx
            sleep 7

            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$NEXT_PORT/health)
            if [ "$STATUS_CODE" -ne 200 ]; then 
              if [ "$NEXT_NAME" = "orignal" ]; then
                sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 down;/g' "$NGINX_CONF"
                sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
              else
                sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
                sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 down;/g' "$NGINX_CONF"
              fi
              sudo systemctl reload nginx
              sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
              sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true
              exit 1
            fi

            if [ "$NEXT_NAME" = "orignal" ]; then
              sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
              sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 down;/g' "$NGINX_CONF"
            else
              sudo sed -i 's/server 127.0.0.1:3000.*/server 127.0.0.1:3000 down;/g' "$NGINX_CONF"
              sudo sed -i 's/server 127.0.0.1:3001.*/server 127.0.0.1:3001 weight=10 max_fails=3 fail_timeout=5s;/g' "$NGINX_CONF"
            fi
            sudo systemctl reload nginx
            sleep 5

            sudo docker stop "$OLD_NAME" >/dev/null 2>&1 || true
            sudo docker rm "$OLD_NAME" >/dev/null 2>&1 || true
            echo "🎉 Deployment completed successfully!"  
    
    secrets: 
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_SSH_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}       