name: deploy on Ec2 aws 
on:
 push:
  branches:
    [ main , keyur ]

jobs:
  test-app:
     name: test the app
     runs-on: ubuntu-latest

     steps:
       - name: checkout code
         uses: actions/checkout@v4

       - name: set up node
         uses: actions/setup-node@v4
         with:
          node-version: "22"
          cache: npm

       - name: install dependecies
         run: npm ci

       - name: testing 
         run: npm test
   
  build-app:
     name: build the image
     runs-on: ubuntu-latest
     needs: test-app
     steps:
       - name: checkout
         uses: actions/checkout@v4

       - name: setup node
         uses: actions/setup-node@v4
         with:
           node-version: "22"  
           cache: npm

       - name: install dependecies
         run: npm ci

       - name: build app 
         run: npm run build
  
       - name: Archive production artifacts
         uses: actions/upload-artifact@v4
         with:
          name: build
          path: build

  push-app:
     name: push on docker
     runs-on: ubuntu-latest
     needs: build-app
     steps:
       # 1. Sabse pehle repository ka code is job ke runner par lekar aao (Isse Dockerfile mil jayegi)
       - name: checkout code
         uses: actions/checkout@v4

       # 2. Build job se compile hua folder 'build' directory me download karo
       - name: Download build artifact
         uses: actions/download-artifact@v4
         with:
          name: build
          path: build

       # 3. Docker login karein
       - name: docker login
         uses: docker/login-action@v3
         with:
           username: ${{ vars.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}

       # 4. Ab build aur push smoothly chal jayega
       - name: build and push
         uses: docker/build-push-action@v6
         with:
           context: .
           file: ./Dockerfile
           push: true
           tags: |
             ${{ vars.DOCKER_USERNAME }}/production:latest
             ${{ vars.DOCKER_USERNAME }}/production:${{ github.sha }}