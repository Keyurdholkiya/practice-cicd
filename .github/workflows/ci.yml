name: automatic rollback new version without remove and delay old version
on:
 push: 
  tags: 
   - "v*"

jobs:
   test-app:
    name: this job test allpication
    runs-on: ubuntu-latest
    steps:
       - name: checkout
         uses: actions/checkout@v4

       - name: setup node
         uses: actions/setup-node@v4
         with:
           node-version: 22
           cache: npm

       - name: test run
         run: npm test || echo "No tests specified"

   docker-login:
    name: docker login jobs
    needs: test-app
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: docker build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/production:${{ github.ref_name }}

   deploy-job:
    name: deploy on EC2 instance on aws
    runs-on: ubuntu-latest
    needs: docker-login
    env:
     COMMIT_VERSION: ${{ github.ref_name }}
    steps:
      - name: ec2 login
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMMIT_VERSION: ${{ env.COMMIT_VERSION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: COMMIT_VERSION
          port: 22
          script: |
           if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
           fi
           NGINX_CONF="/etc/nginx/sites-available/default"

           # 1. Determine active port using Nginx configuration
           if sudo grep -q "13.200.251.48:3001" "$NGINX_CONF"; then
             CURRENT_PORT="3001"
             NEXT_PORT="3000"
             NEXT_NAME="blue"
             OLD_NAME="green"
           else
             CURRENT_PORT="3000"
             NEXT_PORT="3001"
             NEXT_NAME="green"
             OLD_NAME="blue"
           fi

           # 2. Cleanup the targeted container environment using its name (Not port!)
           sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
           sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true

           # 3. Pull and launch the dynamic tag build
           sudo docker pull ${{ secrets.DOCKER_USERNAME }}/production:$COMMIT_VERSION
           sudo docker run -d --name "$NEXT_NAME" -p $NEXT_PORT:3000 ${{ secrets.DOCKER_USERNAME }}/production:$COMMIT_VERSION

           # 4. Verification Check
           sleep 6
           STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://13.200.251.48:$NEXT_PORT/health)
           echo "Target app status code: $STATUS_CODE"

           if [ "$STATUS_CODE" -ne 200 ]; then 
             echo "❌ Health check failed! Rolling back to active deployment..."
             sudo docker stop "$NEXT_NAME" >/dev/null 2>&1 || true
             sudo docker rm "$NEXT_NAME" >/dev/null 2>&1 || true
             exit 1
           fi
            
  
           sudo sed -i "s/13.200.251.48:$CURRENT_PORT/13.200.251.48:$NEXT_PORT/g" "$NGINX_CONF"
           sudo systemctl reload nginx

           sleep 10
    
           sudo docker stop "$OLD_NAME" >/dev/null 2>&1 || true
           sudo docker rm "$OLD_NAME" >/dev/null 2>&1 || true

           echo "🎉 Zero downtime blue-green deployment successful without stopping old container first!"