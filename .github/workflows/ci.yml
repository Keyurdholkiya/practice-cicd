name: automatic rollback new version without remove and delay old version
on:
 push: 
  branches: 
   - main 
  tags: 
   - "v*"
jobs:
   test-app:
    name: this job test allpication
    runs-on: ubuntu-latest
    steps:
       - name: checkout
         uses: actions/checkout@v4

       - name: setup node
         uses: actions/setup-node@v4
         with:
           node-version: 22
           cache: npm

       - name: test run
         run: npm test

   docker-login:
    name: docker login jobs
    needs: test-app
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: docker build and  push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/production:v1
            ${{ secrets.DOCKER_USERNAME }}/production:${{ github.sha }}

   deploy-job:
    name: deploy on EC2 instance on aws
    runs-on: ubuntu-latest
    needs: docker-login
    steps:
      - name: ec2 login
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMMIT-VERSION: ${{ github.ref_name }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: COMMIT-VERSION
          port: 22
          script: |
           NGINX_CONF="/etc/nginx/sites-available/default

           if sudo grep -q "13.200.251.48:3001" "$NGINX_CONF" 
           then
            CURRENT_PORT="3001"
            NEXT_PORT="3000"
            NEXT_NAME="blue"
            OLD_NAME="green"
           else
            CURRENT_PORT="3000"
            NEXT_PORT="3001"
            NEXT_NAME="green"
            OLD_NAME="blue"

           sudo docker stop $NEXT_PORT >/dev/null 2>&1 || true
           sudo docker rm $NEXT_PORT >/dev/null 2>&1 || true

           sudo docker pull ${{ secrets.DOCKER_USERNAME }}/production:$COMMIT-VERSION

           sudo docker run -d --name $NEXT_NAME -p $NEXT_PORT:3000 ${{ secrets.DOCKER_USERNAME }}/production:$COMMIT-VERSION

           sleep 5

           $STATUS_CODE = $(curl -s -o >/dev/null -w "%{http_code}" http://13.200.251.48:$NEXT_PORT/health)

           if [ "$STATUS_CODE" -ne 200 ]
           then 
             sudo docker stop $NEXT_NAME >/dev/null 2>&1 || true
             sudo docker rm $NEXT_NAME >/dev/null 2>&1 || true
             exit 1
           fi
            
           sudo sed -i "s/13.200.251.48:$CURRENT_PORT/13.200.251.48:$NEXT_PORT/g" $NGINX_CONF
           sudo systemctl reload nginx

           sudo docker stop $OLD_NAME >/dev/null 2>&1 || true
           sudo docker rm $OLD_NAME >/dev/null 2>&1 || true

           echo "this is without stop old container run new container"


