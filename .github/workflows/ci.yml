name: deploy on Ec2 aws 
on:
 push:
  branches:
    [ main , keyur]

jobs:
  test-app:
     name: test the app
     runs-on: ubuntu-latest

     steps:
       - name: checkout code
         uses: actions/checkout@v4

       - name: set up node
         uses: actions/setup-node@v4
         with:
          node-version: "22"
          cache: npm

       - name: install dependecies
         run: npm ci

       - name: testing 
         run: npm test
   
  build-app:
     name: build the image
     runs-on: ubuntu-latest
     needs: test-app
     steps:
       - name: checkout
         uses: actions/checkout@v4

       - name: setup node
         uses: actions/setup-node@v4
         with:
           node-version: "22"  
           cache: npm

       - name: install dependecies
         run: npm ci

       - name: build app 
         run: npm run build

  push-app:
     name: push on docker
     runs-on: ubuntu-latest
     needs: build-app
     steps:   
       - name: checkout
         uses: actions/checkout@v4

       - name: docker login
         uses: docker/login-action@v3
         with:
           username: ${{ vars.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_PASSWORD }}

       - name: build and push
         uses: docker/build-push-action@v6
         with:
           context: .
           file: ./Dockerfile
           push: true
           tags: |
            ${{ vars.DOCKER_USERNAME }}/production:latest
            ${{ vars.DOCKER_USERNAME }}/production:${{ github.sha }}

  deploy:
     name: EC2 deploye
     runs-on: ubuntu-latest
     needs: push-app
     steps:
       - name: Deploy to EC2
         uses: appleboy/ssh-action@v1.0.3
         with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USER }}
           key: ${{ secrets.EC2_SSH_KEY }}
           script: |
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo docker pull ${{ vars.DOCKER_USERNAME }}/production:latest
              sudo docker stop node-hello-app-node-hello-app-1 || true
              sudo docker rm node-hello-app-node-hello-app-1 || true
              sudo docker run -d \
               --name node-hello-app-node-hello-app-1 \
               -p 3000:3000 \
               ${{ vars.DOCKER_USERNAME }}/production:latest
