name: automatic rollback
on:
 push: 
  branches:
   - main
jobs:
   test-app:
    name: test application
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node with version
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install dependices
        run: npm ci

      - name: test unit run
        run: npm test

   docker-login:
    name: docker login 
    runs-on: ubuntu-22.04
    needs: test-app
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build and push on docker hub
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
             ${{ secrets.DOCKER_USERNAME }}/production:latest
             ${{ secrets.DOCKER_USERNAME }}/production:${{ github.sha }}

   deploy-app:
    name: deploy app with automatic rollback on EC2
    runs-on: ubuntu-latest
    needs: docker-login
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Previous and Current Commit IDs
        id: commits
        run: |
          echo "PREVIOUS_COMMIT=$(git rev-parse HEAD~1)" >> $GITHUB_ENV
          echo "CURRENT_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: login on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          CURRENT_COMMIT: ${{ env.CURRENT_COMMIT }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: CURRENT_COMMIT,DOCKER_USER
          script: |
            if ! command -v docker &> /dev/null
                then
                    sudo apt update
                    sudo apt install -y docker.io
                    sudo systemctl enable docker
                    sudo systemctl start docker
            fi

            sudo docker stop hello >/dev/null 2>&1 || true
            sudo docker rm hello >/dev/null 2>&1 || true

            IMAGE_NAME="${DOCKER_USER}/production:${CURRENT_COMMIT}"
            
            echo "Pulling image: $IMAGE_NAME"
            sudo docker pull $IMAGE_NAME
            
            echo "Running container..."
            sudo docker run -d --name hello -p 3000:3000 $IMAGE_NAME

      - name: Wait for Server to Start
        run: sleep 5

      - name: Hit Health Check Endpoint
        id: health_check
        run: |
          echo "Checking server health..."
          # Aapke server.js ka /health route hit karenge
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://13.127.162.7:3000/health)
          
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Health check failed with status $STATUS_CODE! Triggering Rollback..."
            exit 1 # Janbujhkar step ko fail kiya taaki agla rollback step chal sake
          else
            echo "Server is healthy! Deployment successful."
          fi
        continue-on-error: false

      - name: Trigger Automatic Rollback
        if: failure() && steps.health_check.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        env:
          PREVIOUS_COMMIT: ${{ env.PREVIOUS_COMMIT }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: PREVIOUS_COMMIT,DOCKER_USER
          script: |

            sudo docker stop hello >/dev/null 2>&1 || true
            sudo docker rm hello >/dev/null 2>&1 || true 

            IMAGE_NAME="${DOCKER_USER}/production:${PREVIOUS_COMMIT}"
            
            sudo docker pull $IMAGE_NAME
            sudo docker run -d --name hello -p 3000:3000 $IMAGE_NAME
            
